name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Prepare release APK
        run: cp app/build/outputs/apk/debug/app-debug.apk AI-Justice-Buddy-debug.apk

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Justice-Buddy-debug.apk
          path: AI-Justice-Buddy-debug.apk
          if-no-files-found: error

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: AI-Justice-Buddy-debug.apk
          path: release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v-debug-${{ github.run_number }}
          name: AI Justice Buddy - Test Build #${{ github.run_number }}
          body: |
            🤖 **AI Justice Buddy - Test APK**

            This is an automated debug build. Download the APK below to test the app on your Android device.

            **Build:** #${{ github.run_number }}
            **Commit:** ${{ github.sha }}
          files: release-assets/AI-Justice-Buddy-debug.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
